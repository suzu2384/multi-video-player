<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>複数動画同期プレーヤー</title>
  <script>
    (() => {
      const BUILD_KEY = '20260627-stat-icons-pair-selector';
      const userAgent = navigator.userAgent || '';
      const touch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
      const mobile = /iPhone|iPad|iPod|Android/i.test(userAgent)
        || (touch && Math.max(window.innerWidth, window.innerHeight) <= 1024);
      if (mobile) document.documentElement.classList.add('mobile-boot');

      const params = new URLSearchParams(location.search);
      const cacheKey = params.get('dev') || BUILD_KEY;
      const stylesheet = document.createElement('link');
      stylesheet.rel = 'stylesheet';
      stylesheet.href = `styles.css?v=${encodeURIComponent(cacheKey)}`;
      document.head.appendChild(stylesheet);
    })();
  </script>
  <style>
    html.mobile-boot #dropZone {
      display: none !important;
    }

    html.mobile-boot:not(.mobile-ui-ready) .mobile-add-video {
      display: none !important;
      visibility: hidden !important;
    }

    @media (min-width: 921px) {
      html:not(.mobile-boot) .video-grid.pair-mode .controls-drawer-content .video-controls {
        display: flex !important;
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 8px !important;
      }

      html:not(.mobile-boot) .video-grid.pair-mode .controls-drawer-content .video-controls label {
        display: grid !important;
        grid-template-columns: 30px minmax(0, 1fr) auto !important;
        align-items: center !important;
        width: 100% !important;
      }

      html:not(.mobile-boot) .video-grid.pair-mode .controls-drawer-content .crop-controls {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
      }

      html:not(.mobile-boot) .video-grid.pair-mode .controls-drawer-content .crop-controls .icon-field {
        display: grid !important;
        grid-template-columns: 30px minmax(0, 1fr) 48px 28px !important;
        align-items: center !important;
        width: 100% !important;
      }
    }

    #devRefreshButton {
      display: none !important;
    }

    .toolbar .toolbar-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      line-height: 0;
    }

    .toolbar .toolbar-icon-image {
      display: block;
      width: 24px;
      height: 24px;
      pointer-events: none;
    }

    .icon-field .field-icon-image {
      display: block;
      width: 22px;
      height: 22px;
      pointer-events: none;
      justify-self: center;
    }

    .icon-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .icon-status .status-icon-image {
      display: block;
      width: 18px;
      height: 18px;
      pointer-events: none;
      flex: 0 0 auto;
    }

    .pair-selector .pair-selector-icon-image {
      display: block;
      width: 18px;
      height: 18px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <button id="devRefreshButton" type="button" title="開発用：キャッシュを使わず再読み込み" aria-label="キャッシュを使わず再読み込み">↻</button>

  <main>
    <section id="pairSettings" class="pair-settings" aria-label="並列表示設定">
      <span class="section-icon" title="並列動画の表示サイズ" aria-label="並列動画の表示サイズ">▣</span>
      <label class="icon-field" title="動画領域の横幅（px）">
        <span aria-hidden="true">↔</span><span class="sr-only">横幅（px）</span>
        <input id="pairWidth" type="number" min="320" max="3840" step="10" value="1280" aria-label="動画領域の横幅（px）" />
      </label>
      <label class="icon-field" title="動画領域の縦幅（px）">
        <span aria-hidden="true">↕</span><span class="sr-only">縦幅（px）</span>
        <input id="pairHeight" type="number" min="180" max="2160" step="10" value="720" aria-label="動画領域の縦幅（px）" />
      </label>
      <button id="resetPairSize" class="icon-button" type="button" title="並列表示サイズを初期値に戻す" aria-label="並列表示サイズを初期値に戻す">↺</button>
      <button id="exportPair" type="button" class="icon-button" title="並列動画を書き出す" aria-label="並列動画を書き出す">⬇</button>
      <label class="icon-field export-option" title="書き出しコーデック">
        <span aria-hidden="true">🎞</span><span class="sr-only">書き出しコーデック</span>
        <select id="exportCodec" aria-label="書き出しコーデック"></select>
      </label>
      <label class="icon-field export-option" title="映像ビットレート">
        <span aria-hidden="true">⚙</span><span class="sr-only">映像ビットレート</span>
        <select id="exportBitrate" aria-label="映像ビットレート">
          <option value="4000000">4 Mbps</option>
          <option value="8000000" selected>8 Mbps</option>
          <option value="12000000">12 Mbps</option>
          <option value="20000000">20 Mbps</option>
        </select>
      </label>
      <div id="exportProgress" class="export-progress" hidden aria-live="polite">
        <progress id="exportProgressBar" max="100" value="0"></progress>
        <span id="exportProgressText">0%</span>
      </div>
    </section>

    <section class="toolbar" aria-label="共通操作">
      <button id="multiModeButton" class="mode-button icon-button active toolbar-icon-button" type="button" title="複数動画モード" aria-label="複数動画モード"><img src="assets/multi-mode-icon.svg" alt="" class="toolbar-icon-image" /></button>
      <button id="pairModeButton" class="mode-button icon-button toolbar-icon-button" type="button" title="並列動画モード" aria-label="並列動画モード"><img src="assets/pair-mode-icon.svg" alt="" class="toolbar-icon-image" /></button>
      <span class="toolbar-separator" aria-hidden="true"></span>
      <button id="playAll" class="icon-button toolbar-icon-button" type="button" title="再生" aria-label="再生"><img src="assets/play-icon.svg" alt="" class="toolbar-icon-image" /></button>
      <button id="pauseAll" class="icon-button toolbar-icon-button" type="button" title="一時停止" aria-label="一時停止"><img src="assets/pause-icon.svg" alt="" class="toolbar-icon-image" /></button>
      <button id="restartAll" class="icon-button toolbar-icon-button" type="button" title="先頭に戻す" aria-label="先頭に戻す"><img src="assets/restart-icon.svg" alt="" class="toolbar-icon-image" /></button>
      <button id="removeAll" type="button" class="danger icon-button toolbar-icon-button" title="すべて削除" aria-label="すべて削除"><img src="assets/trash-icon.svg" alt="" class="toolbar-icon-image" /></button>
      <label class="range-field icon-field" title="共通音量">
        <img src="assets/volume-icon.svg" alt="" class="field-icon-image" /><span class="sr-only">共通音量</span>
        <input id="masterVolume" type="range" min="0" max="1" step="0.01" value="1" aria-label="共通音量" />
      </label>
    </section>

    <section id="dropZone" class="drop-zone" tabindex="0">
      <div class="drop-instruction">
        <strong>動画ファイルをここにドロップ</strong>
        <span>ローカル動画は複数のファイルをまとめて追加できます</span>
      </div>
      <label class="file-button icon-button" title="動画ファイルを選択して追加" aria-label="動画ファイルを選択して追加">
        ＋
        <input id="fileInput" type="file" accept="video/*,.mp4,.m4v,.mov,.webm,.avi,.mkv" multiple />
      </label>
    </section>

    <section id="videoGrid" class="video-grid multi-mode" aria-live="polite"></section>
    <div id="multiStats" class="multi-stats" aria-label="複数動画モードの状態">
      <span id="videoCount" class="icon-status" title="追加されている動画数" aria-label="追加されている動画数"><img src="assets/multi-mode-icon.svg" alt="" class="status-icon-image" /><span class="status-text">0</span></span>
      <span id="selectionCount" class="icon-status" title="並列動画の選択数" aria-label="並列動画の選択数"><img src="assets/pair-mode-icon.svg" alt="" class="status-icon-image" /><span class="status-text">0 / 4</span></span>
      <label class="icon-field" title="複数動画モードの列数">
        <img src="assets/multi-mode-icon.svg" alt="" class="field-icon-image" /><span class="sr-only">列数</span>
        <select id="columnCount" aria-label="複数動画モードの列数"></select>
      </label>
    </div>
  </main>

  <template id="videoCardTemplate">
    <article class="video-card">
      <div class="video-frame">
        <div class="media-viewport">
          <video class="local-media" preload="metadata" playsinline webkit-playsinline></video>
        </div>
        <div class="media-error" hidden></div>
        <div class="pair-move-controls" aria-label="並列位置を入れ替える">
          <button type="button" class="pair-move move-up" data-direction="up" title="上の動画と入れ替える" aria-label="上の動画と入れ替える">↑</button>
          <button type="button" class="pair-move move-left" data-direction="left" title="左の動画と入れ替える" aria-label="左の動画と入れ替える">←</button>
          <button type="button" class="pair-move move-right" data-direction="right" title="右の動画と入れ替える" aria-label="右の動画と入れ替える">→</button>
          <button type="button" class="pair-move move-down" data-direction="down" title="下の動画と入れ替える" aria-label="下の動画と入れ替える">↓</button>
        </div>
        <label class="pair-selector" title="並列動画に選択">
          <img src="assets/pair-mode-icon.svg" alt="" class="pair-selector-icon-image" /><span class="sr-only">並列動画に選択</span>
          <input class="pair-checkbox" type="checkbox" aria-label="並列動画に選択" />
        </label>
      </div>
      <div class="video-info">
        <div class="title-row">
          <span class="video-title"></span>
          <button type="button" class="remove-button" title="この動画を削除" aria-label="この動画を削除">✕</button>
        </div>
        <div class="video-controls">
          <label class="icon-field" title="個別音量">
            <img src="assets/volume-icon.svg" alt="" class="field-icon-image" /><span class="sr-only">個別音量</span>
            <input class="volume-slider" type="range" min="0" max="1" step="0.01" value="1" aria-label="個別音量" />
          </label>
          <label class="icon-field" title="開始位置（秒）">
            <span aria-hidden="true">⏱</span><span class="sr-only">開始位置（秒）</span>
            <input class="start-offset" type="number" min="0" step="0.1" value="0" aria-label="開始位置（秒）" /><span class="input-unit" aria-hidden="true">秒</span>
          </label>
        </div>
        <div class="crop-controls">
          <span class="section-icon" title="並列表示の切り抜き" aria-label="並列表示の切り抜き">✂</span>
          <label class="icon-field" title="拡大率"><span aria-hidden="true">🔍</span><span class="sr-only">拡大率</span><input class="crop-zoom" type="range" min="0.25" max="3" step="0.01" value="1" aria-label="拡大率" /><output>1.00×</output><button class="reset-zoom icon-button mini-reset" type="button" title="拡大率をリセット" aria-label="拡大率をリセット">↺</button></label>
          <label class="icon-field" title="横方向の表示位置"><span aria-hidden="true">↔</span><span class="sr-only">横方向の表示位置</span><input class="crop-x" type="range" min="0" max="100" step="1" value="50" aria-label="横方向の表示位置" /><output>50%</output><button class="reset-x icon-button mini-reset" type="button" title="横位置をリセット" aria-label="横位置をリセット">↺</button></label>
          <label class="icon-field" title="縦方向の表示位置"><span aria-hidden="true">↕</span><span class="sr-only">縦方向の表示位置</span><input class="crop-y" type="range" min="0" max="100" step="1" value="50" aria-label="縦方向の表示位置" /><output>50%</output><button class="reset-y icon-button mini-reset" type="button" title="縦位置をリセット" aria-label="縦位置をリセット">↺</button></label>
        </div>
        <div class="time-row">
          <span class="current-time">00:00.0</span>
          <input class="seek-slider" type="range" min="0" max="1000" step="1" value="0" aria-label="再生位置" />
          <span class="duration">00:00.0</span>
        </div>
      </div>
    </article>
  </template>

  <script>
    (() => {
      const BUILD_KEY = '20260627-stat-icons-pair-selector';
      const params = new URLSearchParams(location.search);
      const cacheKey = params.get('dev') || BUILD_KEY;
      const files = ['app.js', 'mobile-columns.js', 'pair-fix.js'];

      const configureExportCodec = () => {
        const select = document.getElementById('exportCodec');
        if (!select) return;

        [...select.options]
          .filter(option => option.value === '' || option.textContent.trim() === '自動')
          .forEach(option => option.remove());

        const preferredValues = [
          'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
          'video/mp4;codecs=avc1.42E01E',
          'video/mp4'
        ];
        const preferred = preferredValues.find(value => [...select.options].some(option => option.value === value));
        if (preferred) select.value = preferred;
        else if (select.options.length > 0) select.selectedIndex = 0;
      };

      const restoreStatusIcon = (element, iconSrc, normalizeText) => {
        if (!element) return;
        const currentText = normalizeText(element.textContent || '');
        const image = document.createElement('img');
        image.src = iconSrc;
        image.alt = '';
        image.className = 'status-icon-image';
        const text = document.createElement('span');
        text.className = 'status-text';
        text.textContent = currentText;
        element.replaceChildren(image, text);
      };

      const restoreStatusIcons = () => {
        restoreStatusIcon(document.getElementById('videoCount'), 'assets/multi-mode-icon.svg', text => text.replace(/^🎞\s*/, '').trim() || '0');
        restoreStatusIcon(document.getElementById('selectionCount'), 'assets/pair-mode-icon.svg', text => text.replace(/^▥\s*/, '').trim() || '0 / 4');
      };

      const observeStatusIcons = () => {
        const targets = [document.getElementById('videoCount'), document.getElementById('selectionCount')].filter(Boolean);
        let scheduled = false;
        const scheduleRestore = () => {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(() => {
            scheduled = false;
            restoreStatusIcons();
          });
        };
        targets.forEach(target => new MutationObserver(scheduleRestore).observe(target, { childList: true, characterData: true, subtree: true }));
        restoreStatusIcons();
      };

      const loadNext = index => {
        if (index >= files.length) {
          configureExportCodec();
          observeStatusIcons();
          document.documentElement.classList.add('mobile-ui-ready');
          return;
        }
        const script = document.createElement('script');
        script.src = `${files[index]}?v=${encodeURIComponent(cacheKey)}`;
        script.onload = () => loadNext(index + 1);
        document.body.appendChild(script);
      };

      document.getElementById('devRefreshButton').addEventListener('click', () => {
        const url = new URL(location.href);
        url.searchParams.set('dev', String(Date.now()));
        location.replace(url.href);
      });

      loadNext(0);
    })();
  </script>
</body>
</html>
